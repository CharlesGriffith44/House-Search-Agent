<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prospector Dashboard — Filter Listings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --fb: #4FADF9; --rb: #345083; --cream: #FFF8F0; --alice: #DBECF7;
      --lip: #FF4769; --ink: #345083; --white: #FFFFFF; --border: rgba(52,80,131,0.15);
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--cream); color: var(--rb); min-height: 100vh; }
    .container { max-width: 1300px; margin: 0 auto; padding: 24px; }
    
    header { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
    .logo { width: 40px; height: 40px; background: var(--fb); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; }
    h1 { font-size: 28px; font-weight: 700; }
    
    .filters-panel { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 30px; }
    .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
    
    .filter-group h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--rb); margin-bottom: 12px; letter-spacing: 0.4px; }
    .checkbox-list { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input { cursor: pointer; }
    .checkbox-item label { cursor: pointer; flex: 1; }
    
    .price-inputs { display: flex; gap: 10px; align-items: center; }
    .price-inputs input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
    
    .search-btn { background: var(--fb); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
    .search-btn:hover { opacity: 0.9; }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .results-count { font-size: 18px; font-weight: 700; }
    
    .listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .listing-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .listing-source { font-size: 11px; font-weight: 700; color: var(--fb); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px; }
    .listing-price { font-size: 22px; font-weight: 700; color: var(--rb); margin: 12px 0; }
    .listing-type { display: inline-block; font-size: 10px; padding: 4px 10px; border-radius: 12px; background: var(--alice); color: var(--rb); font-weight: 600; margin-bottom: 10px; }
    .listing-type.purchase { background: #FFE4E4; color: var(--lip); }
    .listing-address { font-size: 13px; color: var(--ink); }
    
    .loading { text-align: center; padding: 40px; font-size: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">🏠</div>
      <h1>Prospector Dashboard</h1>
    </header>
    
    <div class="filters-panel">
      <div class="filters-grid">
        <div class="filter-group">
          <h3>Sources</h3>
          <div class="checkbox-list" id="sources-list"></div>
        </div>
        
        <div class="filter-group">
          <h3>Type</h3>
          <div class="checkbox-list">
            <div class="checkbox-item">
              <input type="checkbox" id="type-rental" value="rental" checked>
              <label for="type-rental">Rental</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="type-purchase" value="purchase" checked>
              <label for="type-purchase">Purchase</label>
            </div>
          </div>
        </div>
        
        <div class="filter-group">
          <h3>Price Range (€)</h3>
          <div class="price-inputs">
            <input type="number" id="minPrice" placeholder="Min" value="500">
            <input type="number" id="maxPrice" placeholder="Max" value="50000">
          </div>
        </div>
      </div>
      
      <button class="search-btn" onclick="search()">Search Listings</button>
    </div>
    
    <div class="results-header">
      <div class="results-count">Results: <span id="count">0</span></div>
      <div id="loading" class="loading" style="display:none;">Loading...</div>
    </div>
    
    <div class="listings-grid" id="listings"></div>
  </div>

  <script>
    const API_URL = 'https://00gixdjmf8.execute-api.eu-west-1.amazonaws.com/Prod/search';
    
    async function initializeSources() {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sources: [], type: ['rental', 'purchase'] })
        });
        const data = await response.json();
        const sources = data.prospectorResult.availableSources || [];
        
        const sourcesList = document.getElementById('sources-list');
        sources.forEach(source => {
          const div = document.createElement('div');
          div.className = 'checkbox-item';
          div.innerHTML = `
            <input type="checkbox" class="source-checkbox" value="${source}" checked>
            <label>${source.replace(/-/g, ' ')}</label>
          `;
          sourcesList.appendChild(div);
        });
      } catch (e) {
        console.error('Error loading sources:', e);
      }
    }
    
    async function search() {
      const sources = Array.from(document.querySelectorAll('.source-checkbox:checked')).map(c => c.value);
      const type = Array.from(document.querySelectorAll('input[id^="type-"]:checked')).map(c => c.value);
      const minPrice = parseInt(document.getElementById('minPrice').value) || 0;
      const maxPrice = parseInt(document.getElementById('maxPrice').value) || 999999999;
      
      document.getElementById('loading').style.display = 'block';
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sources, type, minPrice, maxPrice })
        });
        
        const data = await response.json();
        const listings = data.prospectorResult.listings || [];
        
        document.getElementById('count').textContent = listings.length;
        const grid = document.getElementById('listings');
        grid.innerHTML = '';
        
        listings.forEach(listing => {
          const card = document.createElement('div');
          card.className = 'listing-card';
          card.innerHTML = `
            <div class="listing-source">${listing.source.replace(/-/g, ' ')}</div>
            <div class="listing-type ${listing.type}">${listing.type}</div>
            <div class="listing-price">€${listing.price.toLocaleString()}</div>
            <div class="listing-address">${listing.address}</div>
          `;
          grid.appendChild(card);
        });
      } catch (e) {
        console.error('Error fetching listings:', e);
      }
      
      document.getElementById('loading').style.display = 'none';
    }
    
    // Initialize on load
    initializeSources();
    search();
  </script>
</body>
</html>
